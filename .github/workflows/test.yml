name: Test

on:
  push:
    branches: [main]
    # Skip pure docs / install-script / housekeeping pushes — they can't
    # affect cargo build/test outcome. Anything outside this ignore-list
    # (Rust source, Cargo.toml/lock, the workflow itself) still triggers.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'scripts/**'
      - '.gitignore'
      - '.github/workflows/release.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'scripts/**'
      - '.gitignore'
      - '.github/workflows/release.yml'

env:
  # See release.yml for the rationale — actions/checkout / softprops are still
  # on Node 20 actions; this opts the runner into Node 24 ahead of the
  # 2026-06-02 force-switch / 2026-09-16 removal.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build
        run: cargo build --verbose

      - name: Cargo test
        run: cargo test --verbose
